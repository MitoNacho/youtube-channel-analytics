<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>{{ channel.name }} | Youtube Analytics</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-white">
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="fw-bold">Channel Analytics</h1>

        <a href="/" class="btn btn-light"> ← Home </a>
      </div>

      <!-- CHANNEL CARD -->

      <div class="card bg-secondary text-white border-0 shadow-lg mb-5">
        <div class="card-body p-4">
          <div class="row align-items-center">
            <div class="col-lg-3 text-center mb-4 mb-lg-0">
              <img
                src="{{ channel.avatar }}"
                class="img-fluid rounded-circle shadow"
                width="220"
              />
            </div>

            <div class="col-lg-9">
              <h2 class="fw-bold mb-4">{{ channel.name }}</h2>

              <div class="row text-center">
                <div class="col-4">
                  <h3 class="fw-bold">{{ channel.subs }}</h3>

                  <small class="text-light"> Subscribers </small>
                </div>

                <div class="col-4">
                  <h3 class="fw-bold">{{ channel.views }}</h3>

                  <small class="text-light"> Views </small>
                </div>

                <div class="col-4">
                  <h3 class="fw-bold">{{ channel.videos }}</h3>

                  <small class="text-light"> Videos </small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RECENT VIDEOS -->

      <h2 class="fw-bold mb-4">Recent Videos</h2>

      <div class="row g-4">
        {% for video in videos %}

        <div class="col-lg-4 col-md-6">
          <div class="card bg-secondary text-white border-0 shadow-lg h-100">
            <a
              href="https://www.youtube.com/watch?v={{ video.video_id }}"
              target="_blank"
              class="text-decoration-none"
            >
              <img src="{{ video.thumbnail }}" class="card-img-top" />
            </a>

            <div class="card-body">
              <h5 class="card-title">{{ video.title }}</h5>

              <p class="card-text text-light">{{ video.date }}</p>
            </div>
          </div>
        </div>

        {% endfor %}
      </div>
    </div>
  </body>
</html>
