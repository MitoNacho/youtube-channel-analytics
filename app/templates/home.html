<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Youtube Analytics</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-dark text-white">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="text-center mt-5 mb-5">
            <h1 class="display-3 fw-bold">YouTube Analytics</h1>

            <p class="lead text-secondary">
              Analyze and compare YouTube channels
            </p>
          </div>

          <!-- SEARCH CHANNEL -->

          <div class="card bg-secondary border-0 mb-4">
            <div class="card-body p-4">
              <h3 class="mb-3">🔍 Search Channel</h3>

              <form action="/search" method="get">
                <input
                  type="text"
                  name="channel"
                  class="form-control form-control-lg mb-3"
                  placeholder="MrBeast"
                  required
                />

                <button type="submit" class="btn btn-success w-100">
                  Search
                </button>
              </form>
            </div>
          </div>

          <!-- COMPARE CHANNELS -->

          <div class="card bg-secondary border-0">
            <div class="card-body p-4">
              <h3 class="mb-3">⚔️ Compare Channels</h3>

              <form action="/compare" method="get">
                <input
                  type="text"
                  name="first"
                  class="form-control form-control-lg mb-3"
                  placeholder="Ibai"
                  required
                />

                <input
                  type="text"
                  name="second"
                  class="form-control form-control-lg mb-3"
                  placeholder="AuronPlay"
                  required
                />

                <button type="submit" class="btn btn-warning w-100">
                  Compare
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="mt-5 py-5 text-center">
      <div class="mb-3">
        <a
          href="https://mitonacho.github.io/dev/"
          target="_blank"
          class="text-light mx-3 fs-2"
        >
          <i class="bi bi-globe"></i>
        </a>

        <a
          href="https://github.com/MitoNacho"
          target="_blank"
          class="text-light mx-3 fs-2"
        >
          <i class="bi bi-github"></i>
        </a>
      </div>

      <small class="text-secondary">
        Proyecto desarrollado por Nacho Naves
      </small>
    </footer>
  </body>
</html>
