<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Youtube Analytics</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body class="app-body text-white">
    <main class="app-shell">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="app-hero text-center">
            <div class="app-icon mx-auto mb-3">
              <i class="bi bi-youtube"></i>
            </div>

            <h1 class="fw-bold">YouTube Analytics</h1>

            <p class="lead">
              Analyze and compare YouTube channels
            </p>
          </div>

          <!-- SEARCH CHANNEL -->

          <section class="app-card mb-4">
            <div class="card-body">
              <h2 class="app-section-title">
                <i class="bi bi-search"></i>
                Search Channel
              </h2>

              <form action="/search" method="get">
                <input
                  type="text"
                  name="channel"
                  class="form-control form-control-lg mb-3"
                  placeholder="MrBeast"
                  required
                />

                <button type="submit" class="btn btn-success btn-app w-100">
                  Search
                </button>
              </form>
            </div>
          </section>

          <!-- COMPARE CHANNELS -->

          <section class="app-card">
            <div class="card-body">
              <h2 class="app-section-title">
                <i class="bi bi-bar-chart"></i>
                Compare Channels
              </h2>

              <form action="/compare" method="get">
                <input
                  type="text"
                  name="first"
                  class="form-control form-control-lg mb-3"
                  placeholder="Ibai"
                  required
                />

                <input
                  type="text"
                  name="second"
                  class="form-control form-control-lg mb-3"
                  placeholder="AuronPlay"
                  required
                />

                <button type="submit" class="btn btn-warning btn-app w-100">
                  Compare
                </button>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="app-footer text-center">
      <div class="mb-3">
        <a
          href="https://mitonacho.github.io/dev/"
          target="_blank"
          class="text-light mx-3 fs-2"
        >
          <i class="bi bi-globe"></i>
        </a>

        <a
          href="https://github.com/MitoNacho"
          target="_blank"
          class="text-light mx-3 fs-2"
        >
          <i class="bi bi-github"></i>
        </a>
      </div>

      <small>
        Proyecto desarrollado por Nacho Naves
      </small>
    </footer>
  </body>
</html>
