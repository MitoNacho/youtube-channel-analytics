<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Compare Channels</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body class="app-body text-white">
    <main class="app-shell">
      <div class="app-topbar">
        <h1 class="fw-bold">Channel Comparison</h1>

        <a href="/" class="btn btn-light btn-app-secondary">Home</a>
      </div>

      <div class="compare-badge-wrap">
        <span class="compare-badge">VS</span>
      </div>

      <div class="row g-4">
        <!-- FIRST CHANNEL -->

        <div class="col-lg-6">
          <section class="app-card compare-card h-100">
            <div class="card-body">
              <div class="text-center">
                <img
                  src="{{ first.avatar }}"
                  class="compare-avatar"
                  alt="{{ first.name }}"
                />

                <h2 class="compare-title">{{ first.name }}</h2>
              </div>

              <hr />

              <div class="metric-grid">
                <div class="metric-tile">
                  <h4 class="fw-bold">{{ first.subs }}</h4>

                  <small>Subscribers</small>
                </div>

                <div class="metric-tile">
                  <h4 class="fw-bold">{{ first.views }}</h4>

                  <small>Views</small>
                </div>

                <div class="metric-tile">
                  <h4 class="fw-bold">{{ first.videos }}</h4>

                  <small>Videos</small>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- SECOND CHANNEL -->

        <div class="col-lg-6">
          <section class="app-card compare-card h-100">
            <div class="card-body">
              <div class="text-center">
                <img
                  src="{{ second.avatar }}"
                  class="compare-avatar"
                  alt="{{ second.name }}"
                />

                <h2 class="compare-title">{{ second.name }}</h2>
              </div>

              <hr />

              <div class="metric-grid">
                <div class="metric-tile">
                  <h4 class="fw-bold">{{ second.subs }}</h4>

                  <small>Subscribers</small>
                </div>

                <div class="metric-tile">
                  <h4 class="fw-bold">{{ second.views }}</h4>

                  <small>Views</small>
                </div>

                <div class="metric-tile">
                  <h4 class="fw-bold">{{ second.videos }}</h4>

                  <small>Videos</small>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
